<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact — Bud Photograph &amp; Art</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@500;600;700&family=Zen+Kaku+Gothic+New:wght@300;400;500&display=swap');

:root{
  --washi:#F5EFE1;
  --washi-warm:#EFE3C8;
  --washi-glow:#FBEFD3;
  --ink:#3A2C1F;
  --ink-soft:#8A7A63;
  --moss:#7C8556;
  --moss-deep:#5C6B3E;
  --kaki:#CC7A3B;
  --kaki-soft:#EFC08A;
  --line: rgba(58,44,31,0.15);

  --serif: "Shippori Mincho", "Iowan Old Style", serif;
  --sans: "Zen Kaku Gothic New", "Helvetica Neue", sans-serif;
}

*{ box-sizing:border-box; }
html{ scroll-behavior:smooth; }
body{
  margin:0;
  background:var(--washi);
  color:var(--ink);
  font-family:var(--sans);
  font-weight:400;
  -webkit-font-smoothing:antialiased;
}
h1,h2,h3{ font-family:var(--serif); margin:0; font-weight:600; }
p{ margin:0; }
a{ color:inherit; }
::selection{ background:var(--kaki-soft); color:var(--ink); }

.eyebrow{
  font-family:var(--sans); font-weight:500;
  font-size:0.7rem; letter-spacing:0.24em; text-transform:uppercase;
  color:var(--moss-deep);
  display:flex; align-items:center; gap:0.75rem;
}
.eyebrow::before{ content:""; width:22px; height:1px; background:var(--moss-deep); display:inline-block; }

/* ---------- NAV ---------- */
nav{
  position:fixed; top:0; left:0; right:0; z-index:50;
  display:flex; align-items:center; justify-content:space-between;
  padding:1.6rem clamp(1.25rem, 4vw, 3.5rem);
  transition: background 0.4s ease, padding 0.4s ease, box-shadow 0.4s ease;
}
nav.scrolled{
  background:rgba(245,239,225,0.92);
  backdrop-filter: blur(10px);
  padding:1.1rem clamp(1.25rem, 4vw, 3.5rem);
  box-shadow:0 1px 0 var(--line);
}
.brand{ display:flex; align-items:baseline; gap:0.6rem; text-decoration:none; }
.brand .mark{ font-family:var(--serif); font-weight:700; font-size:1.2rem; letter-spacing:0.04em; color:var(--ink); }
.brand .sub{ font-family:var(--sans); font-weight:300; font-size:0.62rem; letter-spacing:0.2em; text-transform:uppercase; color:var(--ink-soft); }
.nav-links{ display:flex; gap:2.2rem; }
.nav-links a{
  font-family:var(--sans); font-weight:400; font-size:0.68rem; letter-spacing:0.16em;
  text-transform:uppercase; text-decoration:none; color:var(--ink-soft);
  padding-bottom:2px; border-bottom:1px solid transparent;
  transition:color 0.3s ease, border-color 0.3s ease;
}
.nav-links a:hover, .nav-links a:focus-visible{ color:var(--kaki); border-color:var(--kaki); outline:none; }
.nav-links a.active{ color:var(--kaki); border-color:var(--kaki); }
.menu-toggle{
    display:none;
    background:none;
    border:none;
    font-size:1.8rem;
    color:var(--ink);
    cursor:pointer;
    padding:0;
}

@media (max-width:720px){

    .menu-toggle{
        display:block;
        z-index:1001;
    }

    .nav-links{
        position:fixed;
        top:0;
        right:-100%;
        width:240px;
        height:100vh;

        background:rgba(245,239,225,.98);
        backdrop-filter:blur(12px);

        display:flex;
        flex-direction:column;
        justify-content:center;
        align-items:center;
        gap:2rem;

        transition:right .35s ease;
        box-shadow:-4px 0 20px rgba(0,0,0,.08);
    }

    .nav-links.open{
        right:0;
    }

    .nav-links a{
        font-size:.9rem;
    }
}

/* ---------- HERO (home page only) ---------- */
.hero{ height:220vh; position:relative; }
.hero-sticky{ position:sticky; top:0; height:100vh; overflow:hidden; background:var(--washi); }
.hero-scene{ position:absolute; inset:0; }
.ridge{ position:absolute; bottom:0; left:0; width:100%; }
.hero-content{ position:absolute; left:0; right:0; top:16%; padding:0 clamp(1.25rem, 6vw, 4.5rem); max-width:820px; z-index:5; }
.hero-content h1{ font-size:clamp(2.2rem, 6vw, 4.6rem); line-height:1.18; letter-spacing:0.005em; color:var(--ink); margin:0 0 1.4rem; }
.hero-content .hero-sub{ font-family:var(--sans); font-weight:400; font-size:1rem; line-height:1.85; color:var(--ink-soft); max-width:32rem; }
.hero-place{ margin-top:2.2rem; display:flex; align-items:center; gap:0.9rem; font-family:var(--sans); font-weight:500; font-size:0.7rem; letter-spacing:0.2em; text-transform:uppercase; color:var(--moss-deep); }
.hero-place::before{ content:""; width:18px; height:1px; background:var(--moss-deep); display:inline-block; }
.scroll-cue{ position:absolute; left:clamp(1.25rem,6vw,4.5rem); bottom:8%; font-family:var(--sans); font-weight:300; font-size:0.65rem; letter-spacing:0.2em; text-transform:uppercase; color:var(--ink-soft); display:flex; align-items:center; gap:0.75rem; }
.scroll-cue .line{ width:38px; height:1px; background:var(--ink-soft); opacity:0.5; }
@media (max-width:720px){ .scroll-cue{ display:none; } }

/* ---------- Generic section ---------- */
.section{ padding:9.5rem clamp(1.25rem, 6vw, 4.5rem) 6rem; min-height:60vh; }
.page-head{ max-width:38rem; margin-bottom:3.5rem; }
.page-head h2{ font-size:clamp(1.9rem,4vw,3rem); font-weight:600; margin:1.1rem 0 1.3rem; line-height:1.3; text-transform:uppercase; }
.page-head p{ color:var(--ink-soft); font-size:1.02rem; line-height:1.9; }

/* ---------- STORY (home page) ---------- */
.story{ background:var(--washi); display:grid; grid-template-columns:0.85fr 1.15fr; gap:4.5rem; align-items:start; border-top:1px solid var(--line); }
.story .story-head{ position:sticky; top:9rem; padding-left:1.75rem; border-left:1px solid var(--moss); }
.story h2{ font-size:clamp(1.7rem, 3.4vw, 2.5rem); line-height:1.35; letter-spacing:0.01em; font-weight:600; }
.story .story-copy{ font-size:1.02rem; line-height:1.9; color:var(--ink-soft); max-width:36rem; }
.story .story-copy + .story-copy{ margin-top:1.4rem; }
@media (max-width:840px){ .story{ grid-template-columns:1fr; gap:2rem; } .story .story-head{ position:static; } }

/* ---------- SERVICE page ---------- */
.expect-head{ max-width:38rem; margin:0 0 3.5rem; }
.expect-head h2{ font-size:clamp(1.7rem,3.4vw,2.5rem); font-weight:600; margin:1.1rem 0 1.3rem; line-height:1.35; }
.expect-head p{ color:var(--ink-soft); font-size:1.02rem; line-height:1.9; }
.expect-head p + p{ margin-top:1.1rem; }

.stat-row{ display:grid; grid-template-columns:repeat(4,1fr); gap:2.5rem; border-top:1px solid var(--line); padding-top:2.8rem; margin-top:1rem; }
.stat{ text-align:left; }
.stat .tick{ width:14px; height:1px; background:var(--kaki); margin-bottom:1rem; }
.stat .num{ font-family:var(--serif); font-weight:600; font-size:clamp(1.6rem,2.6vw,2.2rem); color:var(--ink); }
.stat .label{ font-family:var(--sans); font-weight:400; font-size:0.72rem; letter-spacing:0.12em; text-transform:uppercase; color:var(--ink-soft); margin-top:0.5rem; }
@media (max-width:760px){ .stat-row{ grid-template-columns:1fr 1fr; row-gap:2.5rem; } }

.location-block{ margin-top:5rem; padding-top:3.5rem; border-top:1px solid var(--line); }
.locations-head{ margin-bottom:2.5rem; max-width:32rem; }
.locations-head h2{ font-size:clamp(1.7rem, 3.4vw, 2.5rem); font-weight:600; color:var(--ink); line-height:1.35; margin-top:1.1rem; }
.locations-head .loc-copy{ font-size:1rem; line-height:1.9; color:var(--ink-soft); margin-top:1.2rem; }
.loc-list{ list-style:none; margin:0; padding:0; border-top:1px solid var(--line); max-width:38rem; }
.loc-list li{ display:flex; align-items:baseline; gap:1.2rem; padding:1.6rem 0; border-bottom:1px solid var(--line); font-family:var(--sans); font-weight:400; font-size:1rem; letter-spacing:0.01em; }
.loc-list li .dash{ color:var(--kaki); font-family:var(--serif); }
.loc-list li .note{ margin-left:auto; color:var(--ink-soft); font-size:0.68rem; letter-spacing:0.14em; text-transform:uppercase; opacity:0.7; }
@media (max-width:720px){ .loc-list li .note{ display:none; } }

/* ---------- GALLERY page ---------- */
.gallery-grid{ display:grid; grid-template-columns:repeat(3,1fr); gap:1.5rem; }
.gallery-tile{
  aspect-ratio:4/5; border-radius:2px;
  background:
    radial-gradient(circle at 30% 20%, rgba(239,192,138,0.65), transparent 60%),
    linear-gradient(160deg, var(--washi-warm), var(--washi-glow));
  border:1px dashed var(--line);
  display:flex; align-items:center; justify-content:center;
  text-align:center; padding:1rem;
}
.gallery-tile span{ font-family:var(--sans); font-weight:400; font-size:0.7rem; letter-spacing:0.12em; text-transform:uppercase; color:var(--ink-soft); }
@media (max-width:760px){ .gallery-grid{ grid-template-columns:1fr 1fr; } }
@media (max-width:480px){ .gallery-grid{ grid-template-columns:1fr; } }

/* ---------- CONTACT page ---------- */
.cta{ background:linear-gradient(180deg, var(--washi-warm) 0%, var(--washi-glow) 100%); color:var(--ink); text-align:center; }
.cta .enso-mark{ width:52px; height:52px; margin:0 auto 1.75rem; opacity:0.9; }
.cta h2{ font-size:clamp(2rem,4.6vw,3.2rem); font-weight:600; line-height:1.3; max-width:30rem; margin:0 auto 1.4rem; text-transform:uppercase; }
.cta > p.sub{ color:var(--ink-soft); max-width:28rem; margin:0 auto 2rem; line-height:1.9; font-size:1rem; }
.cta > p.contact-email{ margin:0 auto 3rem; }
.cta > p.contact-email a{
  font-family:var(--sans); font-weight:500; font-size:0.85rem; letter-spacing:0.08em;
  text-transform:uppercase; color:var(--kaki); text-decoration:none;
  border-bottom:1px solid var(--kaki-soft); padding-bottom:2px;
}
.cta > p.contact-email a:hover, .cta > p.contact-email a:focus-visible{ color:var(--ink); border-color:var(--ink); outline:none; }

form.inquiry{ max-width:32rem; margin:0 auto; text-align:left; display:grid; gap:1.4rem; }
.form-row{ display:grid; grid-template-columns:1fr 1fr; gap:1.4rem; }
@media (max-width:600px){ .form-row{ grid-template-columns:1fr; } }
label{ font-family:var(--sans); font-weight:400; font-size:0.66rem; letter-spacing:0.16em; text-transform:uppercase; color:var(--ink-soft); display:block; margin-bottom:0.6rem; }
input, textarea{ width:100%; background:transparent; border:none; border-bottom:1px solid var(--line); color:var(--ink); font-family:var(--sans); font-size:0.95rem; padding:0.6rem 0.1rem; }
input::placeholder, textarea::placeholder{ color:rgba(58,44,31,0.35); }
input:focus, textarea:focus{ outline:none; border-color:var(--kaki); }
textarea{ resize:vertical; min-height:5rem; }
.submit-btn{
  justify-self:start; margin-top:0.5rem;
  font-family:var(--sans); font-weight:500; font-size:0.72rem; letter-spacing:0.16em; text-transform:uppercase;
  background:var(--kaki); color:var(--washi); border:1px solid var(--kaki);
  padding:1rem 2.2rem; cursor:pointer; transition:background 0.3s ease, color 0.3s ease;
}
.submit-btn:hover, .submit-btn:focus-visible{ background:transparent; color:var(--kaki); outline:none; }

/* ---------- FOOTER ---------- */
footer{
  background:var(--washi-warm); color:var(--ink-soft);
  padding:2.75rem clamp(1.25rem,6vw,4.5rem);
  display:flex; justify-content:space-between; flex-wrap:wrap; gap:1rem;
  font-family:var(--sans); font-weight:300; font-size:0.68rem; letter-spacing:0.1em; text-transform:uppercase;
  border-top:1px solid var(--line);
}
footer a{ text-decoration:none; color:inherit; }

@media (prefers-reduced-motion: reduce){ html{ scroll-behavior:auto; } }

</style>
</head>
<body>

<nav id="nav">
  <a href="index.html" class="brand">
    <span class="mark">Bud</span>
    <span class="sub">Photograph &amp; Art</span>
  </a>
  <button
  id="menuToggle"
  class="menu-toggle"
  aria-label="Menu"
  aria-expanded="false"
  aria-controls="navLinks">
  ☰
  </button>

  <div class="nav-links" id="navLinks">
    <a href="service.html">Service</a>
    <a href="gallery.html">Gallery</a>
    <a href="contact.html" class="active">Contact</a>
  </div>
</nav>

<section class="section cta">
  <svg class="enso-mark" viewBox="0 0 100 100">
    <circle cx="50" cy="50" r="36" fill="none" stroke="#CC7A3B" stroke-width="4" stroke-linecap="round" stroke-dasharray="215 226" transform="rotate(-95 50 50)"/>
  </svg>
  <h2>Let&rsquo;s document your story</h2>
  <p class="sub">Tell us a little about your family and the moment you want to hold on to. We&rsquo;ll follow up to find a golden hour that works for you.</p>
  <p class="contact-email"><a href="mailto:Budphotoart@gmail.com">Budphotoart@gmail.com</a></p>
  <form
    id="contact-form"
    class="inquiry"
    action="https://formspree.io/f/xkodvvop"
    method="POST">


    <div class="form-row">
      <div><label for="name">Name</label><input
    id="name"
    name="name"
    type="text"
    placeholder="Your name"
    required></div>
      <div><label for="email">Email</label><input
    id="email"
    name="email"
    type="email"
    placeholder="you@email.com"
    required></div>
    </div>
    <div><label for="date">Preferred timeframe</label><input
    id="date"
    name="timeframe"
    type="text"
    placeholder="e.g. mid-October, evenings"></div>
    <div><label for="message">Tell us about your family</label><textarea
    id="message"
    name="message"
    placeholder="Who's in the session, and what matters most to you about these photos?"
    required></textarea></div>
    <button class="submit-btn" type="submit">Send inquiry</button>
  </form>
</section>

<footer>
  <span>&copy; 2026 Bud Photograph &amp; Art — Austin, Texas</span>
  <span><a href="mailto:Budphotoart@gmail.com">Budphotoart@gmail.com</a></span>
</footer>

<script>
const nav = document.getElementById('nav');
const hero = document.getElementById('hero');

const menuToggle = document.getElementById('menuToggle');
const navLinks = document.getElementById('navLinks');

if (menuToggle && navLinks) {

  menuToggle.addEventListener('click', () => {
    const isOpen = navLinks.classList.toggle('open');
    menuToggle.textContent = isOpen ? '✕' : '☰';
    menuToggle.setAttribute('aria-expanded', String(isOpen));
  });

  navLinks.querySelectorAll('a').forEach(link => {
    link.addEventListener('click', () => {
      navLinks.classList.remove('open');
      menuToggle.textContent = '☰';
      menuToggle.setAttribute('aria-expanded', 'false');
    });
  });

}
const reduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

function lerp(a,b,t){ return a + (b-a)*t; }
function hexToRgb(h){ h=h.replace('#',''); return [parseInt(h.substr(0,2),16),parseInt(h.substr(2,2),16),parseInt(h.substr(4,2),16)]; }
function mixHex(h1,h2,t){
  const a=hexToRgb(h1), b=hexToRgb(h2);
  const r=Math.round(lerp(a[0],b[0],t)), g=Math.round(lerp(a[1],b[1],t)), bl=Math.round(lerp(a[2],b[2],t));
  return `rgb(${r},${g},${bl})`;
}

if(hero){
  // HOME PAGE: nav starts transparent over the hero, and the enso/hero scene animates on scroll
  const content = document.querySelector('.hero-content');
  const cue = document.querySelector('.scroll-cue');
  const ring = document.getElementById('ensoRing');
  const glow1 = document.getElementById('glowStop1');
  const glow2 = document.getElementById('glowStop2');
  const ridgeBack = document.getElementById('ridgeBack');
  const ridgeMid = document.getElementById('ridgeMid');

  const R = 92;
  const CIRC = 2 * Math.PI * R;
  ring.style.strokeDasharray = CIRC;
  ring.style.strokeDashoffset = CIRC;

  function render(progress){
    const drawT = Math.min(progress / 0.7, 1);
    ring.style.strokeDashoffset = CIRC - (CIRC * 0.94 * drawT);
    ring.setAttribute('stroke', mixHex('#EFC08A', '#CC7A3B', progress));

    glow1.setAttribute('stop-color', mixHex('#FBEFD3', '#F3C989', progress));
    glow2.setAttribute('stop-color', mixHex('#FBEFD3', '#F3C989', progress));

    ridgeBack.setAttribute('fill', mixHex('#DCCFA6', '#C9A45E', progress));
    ridgeMid.setAttribute('fill', mixHex('#9C9159', '#8C5A2E', progress));

    const fadeStart = 0.5, fadeEnd = 0.95;
    let f = (progress - fadeStart) / (fadeEnd - fadeStart);
    f = Math.min(Math.max(f,0),1);
    content.style.opacity = 1 - f;
    content.style.transform = `translateY(${f*22}px)`;
    cue.style.opacity = progress < 0.12 ? 1 : Math.max(0, 1 - (progress-0.12)/0.2);
  }

  function onScroll(){
    const total = hero.offsetHeight - window.innerHeight;
    const rect = hero.getBoundingClientRect();
    let progress = total > 0 ? (-rect.top / total) : 0;
    progress = Math.min(Math.max(progress,0),1);
    render(progress);
    nav.classList.toggle('scrolled', window.scrollY > 40);
  }

  if(reduced){
    render(0.4);
    window.addEventListener('scroll', ()=> nav.classList.toggle('scrolled', window.scrollY > 40), {passive:true});
  } else {
    let ticking = false;
    window.addEventListener('scroll', ()=>{
      if(!ticking){ requestAnimationFrame(()=>{ onScroll(); ticking = false; }); ticking = true; }
    }, {passive:true});
    onScroll();
  }
} else {
  // SUBPAGES: no hero, nav is solid from the start
  nav.classList.add('scrolled');
}

const form = document.getElementById("contact-form");

if (form) {
  form.addEventListener("submit", async function (e) {
    e.preventDefault();

    const response = await fetch(form.action, {
      method: "POST",
      body: new FormData(form),
      headers: {
        Accept: "application/json"
      }
    });

    if (response.ok) {
      window.location.href = "thankyou.html";
    } else {
      alert("Sorry, something went wrong. Please try again.");
    }
  });
}

</script>
</body>
</html>
