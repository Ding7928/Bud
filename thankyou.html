<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Thank You | Bud Photograph & Art</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@500;600;700&family=Zen+Kaku+Gothic+New:wght@300;400;500&display=swap');

:root{
    --washi:#F5EFE1;
    --washi-warm:#EFE3C8;
    --ink:#3A2C1F;
    --ink-soft:#8A7A63;
    --kaki:#CC7A3B;
}

*{
    box-sizing:border-box;
}

body{
    margin:0;
    background:var(--washi);
    color:var(--ink);
    font-family:"Zen Kaku Gothic New","Helvetica Neue",sans-serif;

    display:flex;
    justify-content:center;
    align-items:center;

    min-height:100vh;
    text-align:center;
    padding:40px;
}

.container{
    max-width:650px;
}

.circle{
    width:70px;
    height:70px;
    margin:0 auto 30px;

    border:2px solid var(--kaki);
    border-radius:50%;

    display:flex;
    justify-content:center;
    align-items:center;

    color:var(--kaki);
    font-size:34px;
    font-weight:600;
}

h1{
    font-family:"Shippori Mincho",serif;
    font-size:48px;
    font-weight:600;
    margin-bottom:24px;
}

p{
    color:var(--ink-soft);
    font-size:18px;
    line-height:1.9;
    margin:12px 0;
}

.button{
    display:inline-block;
    margin-top:40px;

    padding:14px 34px;

    background:var(--kaki);
    color:white;

    text-decoration:none;
    letter-spacing:.08em;
    text-transform:uppercase;

    border:1px solid var(--kaki);

    transition:.3s ease;
}

.button:hover{
    background:transparent;
    color:var(--kaki);
}
</style>
</head>

<body>

<div class="container">

    <div class="circle">✓</div>

    <h1>Thank You</h1>

    <p>Your message has been received.</p>

    <p>Thank you for reaching out to <strong>Bud Photograph &amp; Art</strong>.</p>

    <p>We're honored to help document your family's story and look forward to connecting with you.</p>

    <p>We'll be in touch within 24 hours.</p>

    <a class="button" href="index.html">Back to Home</a>

</div>

</body>
</html>
